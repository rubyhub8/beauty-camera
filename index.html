<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>專業級精修美顏相機</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    body { margin: 0; padding: 0; background: #000; overflow: hidden; display: flex; flex-direction: column; justify-content: center; height: 100vh; font-family: sans-serif; }
    canvas { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
    #flash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; opacity: 0; pointer-events: none; transition: opacity 0.3s ease-out; z-index: 100; }
    #statusInfo { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.6); color: white; padding: 10px 20px; border-radius: 20px; font-size: 14px; font-weight: bold; pointer-events: none; z-index: 10; display: none; }
    .controls { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 85%; max-width: 400px; z-index: 10; }
    .snap-btn { width: 100%; padding: 18px; border: none; border-radius: 50px; background: white; color: black; font-size: 20px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
  </style>
</head>
<body>
  <div id="flash"></div>
  <div id="statusInfo">精修美肌中...</div>
  <video id="input_video" playsinline style="display: none;"></video>
  <canvas id="output_canvas"></canvas>
  <div class="controls">
    <button id="snapBtn" class="snap-btn">📸 拍照</button>
  </div>

  <script>
    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    const snapBtn = document.getElementById('snapBtn');
    const flashElement = document.getElementById('flash');
    const statusInfo = document.getElementById('statusInfo');

    let latestImage = null;
    let latestLandmarks = null;

    function onResults(results) {
      latestImage = results.image;
      latestLandmarks = (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) ? results.multiFaceLandmarks[0] : null;
      if (canvasElement.width !== results.image.width) {
        canvasElement.width = results.image.width;
        canvasElement.height = results.image.height;
      }
      canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
    }

    snapBtn.addEventListener('click', async () => {
      if (!latestImage || !latestLandmarks) return;
      flashElement.style.opacity = 1; setTimeout(() => flashElement.style.opacity = 0, 100);
      statusInfo.style.display = 'block'; snapBtn.disabled = true;
      await new Promise(r => setTimeout(r, 50));

      const w = latestImage.width, h = latestImage.height;
      const ctx = document.createElement('canvas').getContext('2d');
      ctx.canvas.width = w; ctx.canvas.height = h;
      
      // 1. 高頻細節層 (Texture)
      const hFreq = document.createElement('canvas'); hFreq.width = w; hFreq.height = h;
      const hCtx = hFreq.getContext('2d');
      hCtx.filter = 'blur(1px)'; hCtx.drawImage(latestImage, 0, 0);
      hCtx.globalCompositeOperation = 'difference'; hCtx.drawImage(latestImage, 0, 0);

      // 2. 柔焦層 (Skin)
      const skin = document.createElement('canvas'); skin.width = w; skin.height = h;
      const sCtx = skin.getContext('2d');
      sCtx.filter = 'blur(25px) brightness(1.1) contrast(0.8)';
      sCtx.drawImage(latestImage, 0, 0);
      sCtx.globalCompositeOperation = 'destination-in';
      const g = sCtx.createRadialGradient(latestLandmarks[1].x*w, latestLandmarks[1].y*h, w*0.1, latestLandmarks[1].x*w, latestLandmarks[1].y*h, w*0.5);
      g.addColorStop(0, '#000'); g.addColorStop(1, 'transparent');
      sCtx.fillStyle = g; sCtx.fillRect(0,0,w,h);
      ctx.drawImage(skin, 0, 0);

      // 3. 五官挖空
      ctx.globalCompositeOperation = 'destination-out';
      ctx.fillStyle = '#000';
      const erase = (idx) => {
        ctx.beginPath();
        idx.forEach((i, n) => n==0 ? ctx.moveTo(latestLandmarks[i].x*w, latestLandmarks[i].y*h) : ctx.lineTo(latestLandmarks[i].x*w, latestLandmarks[i].y*h));
        ctx.closePath(); ctx.fill();
      };
      erase([33, 160, 158, 133, 153, 144]); erase([362, 385, 387, 263, 373, 380]);
      erase([78, 191, 80, 81, 82, 13, 312, 311, 310, 415, 308, 324, 318, 402, 317, 14, 87, 178, 88, 95]);

      // 4. 羽化遮瑕
      const concealer = document.createElement('canvas'); concealer.width = w; concealer.height = h;
      const cCtx = concealer.getContext('2d');
      cCtx.fillStyle = 'rgba(255, 230, 210, 0.6)';
      cCtx.beginPath();
      cCtx.arc(latestLandmarks[145].x*w, latestLandmarks[145].y*h + h*0.02, w*0.06, 0, Math.PI*2);
      cCtx.arc(latestLandmarks[374].x*w, latestLandmarks[374].y*h + h*0.02, w*0.06, 0, Math.PI*2);
      cCtx.fill();
      ctx.filter = 'blur(12px)'; ctx.drawImage(concealer, 0, 0); ctx.filter = 'none';

      // 5. 疊加細節
      ctx.globalCompositeOperation = 'overlay'; ctx.globalAlpha = 0.4; ctx.drawImage(hFreq, 0, 0);

      // 匯出
      const final = document.createElement('canvas'); final.width = w; final.height = h;
      const fCtx = final.getContext('2d');
      fCtx.translate(w, 0); fCtx.scale(-1, 1);
      fCtx.drawImage(ctx.canvas, 0, 0);
      const link = document.createElement('a');
      link.download = `beauty-${new Date().getTime()}.png`;
      link.href = final.toDataURL('image/png', 1.0);
      link.click();
      statusInfo.style.display = 'none'; snapBtn.disabled = false;
    });

    const fm = new FaceMesh({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`});
    fm.setOptions({maxNumFaces: 1, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5});
    fm.onResults(onResults);
    new Camera(videoElement, {onFrame: async () => await fm.send({image: videoElement}), width: 1280, height: 720}).start();
  </script>
</body>
</html>
