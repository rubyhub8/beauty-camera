<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>專業美肌相機 (自訂遮瑕色版)</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    body { margin: 0; padding: 0; background: #111; overflow: hidden; display: flex; flex-direction: column; justify-content: center; height: 100vh; font-family: sans-serif; }
    canvas { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); cursor: crosshair; }
    
    .hint { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: rgba(255, 59, 48, 0.8); color: white; padding: 8px 16px; border-radius: 20px; font-size: 14px; font-weight: bold; pointer-events: none; z-index: 10; }
    
    .controls { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.75); padding: 15px; border-radius: 16px; width: 90%; max-width: 400px; color: white; backdrop-filter: blur(5px); display: flex; flex-direction: column; gap: 10px; }
    .control-group { display: flex; align-items: center; }
    .control-group label { flex: 1; font-size: 14px; font-weight: bold; }
    .control-group input[type="range"] { flex: 2; }
    .control-group input[type="color"] { flex: 2; height: 30px; border: none; border-radius: 4px; cursor: pointer; }
    
    .btn-group { display: flex; gap: 10px; }
    .btn { flex: 1; padding: 12px; border: none; border-radius: 10px; color: white; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; }
    .btn-clear { background: #555; }
    .btn-clear:active { background: #333; transform: scale(0.98); }
    .btn-snap { background: #FF3B30; }
    .btn-snap:active { background: #CC2E26; transform: scale(0.98); }
  </style>
</head>
<body>
  <div class="hint">👆 先選好顏色，再點擊斑點</div>
  <video id="input_video" playsinline style="display: none;"></video>
  <canvas id="output_canvas"></canvas>

  <div class="controls">
    <div class="control-group">
      <label>全臉粉底：</label>
      <input type="range" id="blurRange" min="0" max="40" value="20">
    </div>
    <div class="control-group">
      <label>遮瑕顏色：</label>
      <input type="color" id="spotColor" value="#E6B999">
    </div>
    <div class="control-group">
      <label>遮瑕厚度：</label>
      <input type="range" id="spotRange" min="0.1" max="1.0" step="0.05" value="0.7">
    </div>
    <div class="btn-group">
      <button id="clearBtn" class="btn btn-clear">清除單點</button>
      <button id="snapBtn" class="btn btn-snap">📸 拍照</button>
    </div>
  </div>

  <script>
    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    
    const blurRange = document.getElementById('blurRange');
    const spotColorInput = document.getElementById('spotColor');
    const spotRange = document.getElementById('spotRange');
    const snapBtn = document.getElementById('snapBtn');
    const clearBtn = document.getElementById('clearBtn');

    let userSpots = [];
    let currentLandmarks = null;

    // 將 Hex 色碼轉換為 Rgba 格式，以支援羽化透明度
    function hexToRgba(hex, alpha) {
      let r = parseInt(hex.slice(1, 3), 16),
          g = parseInt(hex.slice(3, 5), 16),
          b = parseInt(hex.slice(5, 7), 16);
      return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }

    canvasElement.addEventListener('pointerdown', (e) => {
      if (!currentLandmarks) return;
      const rect = canvasElement.getBoundingClientRect();
      const scaleX = canvasElement.width / rect.width;
      const scaleY = canvasElement.height / rect.height;
      const clickX = canvasElement.width - ((e.clientX - rect.left) * scaleX);
      const clickY = (e.clientY - rect.top) * scaleY;

      let minDist = Infinity;
      let closestIndex = -1;

      for (let i = 0; i < currentLandmarks.length; i++) {
        const lx = currentLandmarks[i].x * canvasElement.width;
        const ly = currentLandmarks[i].y * canvasElement.height;
        const dist = Math.hypot(lx - clickX, ly - clickY);
        if (dist < minDist) { minDist = dist; closestIndex = i; }
      }
      if (closestIndex !== -1) userSpots.push(closestIndex);
    });

    clearBtn.addEventListener('click', () => userSpots = []);

    function onResults(results) {
      if (canvasElement.width !== results.image.width || canvasElement.height !== results.image.height) {
        canvasElement.width = results.image.width;
        canvasElement.height = results.image.height;
      }
      if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
        currentLandmarks = results.multiFaceLandmarks[0];
      } else {
        currentLandmarks = null;
      }

      canvasCtx.globalCompositeOperation = 'source-over';
      canvasCtx.filter = 'none';
      canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

      if (currentLandmarks) {
        const nose = currentLandmarks[1];
        const leftCheek = currentLandmarks[234];
        const rightCheek = currentLandmarks[454];
        const top = currentLandmarks[10];
        const chin = currentLandmarks[152];

        const faceWidth = Math.abs(rightCheek.x - leftCheek.x) * canvasElement.width;
        const faceHeight = Math.abs(chin.y - top.y) * canvasElement.height;

        // 全臉粉底
        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = canvasElement.width;
        tempCanvas.height = canvasElement.height;
        const tempCtx = tempCanvas.getContext('2d');

        const blurVal = blurRange.value;
        tempCtx.filter = `blur(${blurVal}px) brightness(1.1) contrast(0.85)`;
        tempCtx.drawImage(results.image, 0, 0, tempCanvas.width, tempCanvas.height);

        tempCtx.globalCompositeOperation = 'destination-in';
        const centerX = nose.x * canvasElement.width;
        const centerY = nose.y * canvasElement.height; 
        const radiusX = faceWidth * 0.75; 
        const radiusY = faceHeight * 0.75;
        const gradient = tempCtx.createRadialGradient(centerX, centerY, radiusX * 0.8, centerX, centerY, radiusX * 1.2);
        gradient.addColorStop(0, 'rgba(0, 0, 0, 1)'); 
        gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
        tempCtx.fillStyle = gradient;
        tempCtx.beginPath();
        tempCtx.ellipse(centerX, centerY, radiusX, radiusY, 0, 0, 2 * Math.PI);
        tempCtx.fill();

        tempCtx.globalCompositeOperation = 'destination-out';
        tempCtx.fillStyle = 'black'; 
        const leftEyeIndices = [33, 160, 158, 133, 153, 144];
        const rightEyeIndices = [362, 385, 387, 263, 373, 380];
        const mouthIndices = [78, 191, 80, 81, 82, 13, 312, 311, 310, 415, 308, 324, 318, 402, 317, 14, 87, 178, 88, 95];
        const eraseFeature = (indices) => {
          tempCtx.beginPath();
          indices.forEach((index, i) => {
            const pt = currentLandmarks[index];
            if (i === 0) tempCtx.moveTo(pt.x * canvasElement.width, pt.y * canvasElement.height);
            else tempCtx.lineTo(pt.x * canvasElement.width, pt.y * canvasElement.height);
          });
          tempCtx.closePath();
          tempCtx.fill();
        };
        eraseFeature(leftEyeIndices);
        eraseFeature(rightEyeIndices);
        eraseFeature(mouthIndices);

        canvasCtx.globalCompositeOperation = 'source-over';
        canvasCtx.drawImage(tempCanvas, 0, 0);

        // 手動單點遮瑕 (使用選擇的顏色，真實覆蓋)
        if (userSpots.length > 0) {
          const spotStrength = spotRange.value;
          const hexColor = spotColorInput.value;
          
          canvasCtx.globalCompositeOperation = 'source-over';
          canvasCtx.globalAlpha = spotStrength;

          userSpots.forEach(index => {
            const pt = currentLandmarks[index];
            const px = pt.x * canvasElement.width;
            const py = pt.y * canvasElement.height;
            const spotRadius = faceWidth * 0.05; 

            const spotGrad = canvasCtx.createRadialGradient(px, py, 0, px, py, spotRadius);
            
            // 動態帶入使用者選擇的顏色，並製作羽化效果
            spotGrad.addColorStop(0, hexToRgba(hexColor, 0.95)); 
            spotGrad.addColorStop(0.5, hexToRgba(hexColor, 0.6));
            spotGrad.addColorStop(1, hexToRgba(hexColor, 0));

            canvasCtx.beginPath();
            canvasCtx.fillStyle = spotGrad;
            canvasCtx.arc(px, py, spotRadius, 0, 2 * Math.PI);
            canvasCtx.fill();
          });
          canvasCtx.globalAlpha = 1.0;
        }
      }
    }

    snapBtn.addEventListener('click', () => {
      const saveCanvas = document.createElement('canvas');
      saveCanvas.width = canvasElement.width;
      saveCanvas.height = canvasElement.height;
      const ctx = saveCanvas.getContext('2d');
      ctx.translate(saveCanvas.width, 0);
      ctx.scale(-1, 1);
      ctx.drawImage(canvasElement, 0, 0);
      const link = document.createElement('a');
      link.download = `beauty-cam-${new Date().getTime()}.png`;
      link.href = saveCanvas.toDataURL('image/png');
      link.click();
    });

    const faceMesh = new FaceMesh({locateFile: (file) => {
      return `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`;
    }});
    faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: false, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
    faceMesh.onResults(onResults);

    const camera = new Camera(videoElement, {
      onFrame: async () => { await faceMesh.send({image: videoElement}); },
      width: 1280, height: 720
    });
    camera.start();
  </script>
</body>
</html>
