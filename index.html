<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>專業美肌相機 (後台精修版)</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    body { margin: 0; padding: 0; background: #000; overflow: hidden; display: flex; flex-direction: column; justify-content: center; height: 100vh; font-family: sans-serif; }
    /* 預覽畫面：保持原圖流暢度 */
    canvas { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
    
    /* 拍照閃光特效 */
    #flash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; opacity: 0; pointer-events: none; transition: opacity 0.3s ease-out; z-index: 100; }
    
    /* 狀態提示 */
    #statusInfo { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.6); color: white; padding: 10px 20px; border-radius: 20px; font-size: 14px; font-weight: bold; pointer-events: none; z-index: 10; display: none; }

    .controls { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 85%; max-width: 400px; display: flex; flex-direction: column; gap: 10px; z-index: 10; }
    .snap-btn { width: 100%; padding: 18px; border: none; border-radius: 50px; background: white; color: black; font-size: 20px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.5); transition: 0.1s; }
    .snap-btn:active { background: #ddd; transform: scale(0.95); }
  </style>
</head>
<body>
  <div id="flash"></div>
  <div id="statusInfo">處理中，請稍候...</div>
  
  <video id="input_video" playsinline style="display: none;"></video>
  <canvas id="output_canvas"></canvas>

  <div class="controls">
    <button id="snapBtn" class="snap-btn">📸 拍照</button>
  </div>

  <script>
    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    const snapBtn = document.getElementById('snapBtn');
    const flashElement = document.getElementById('flash');
    const statusInfo = document.getElementById('statusInfo');

    let latestImage = null;
    let latestLandmarks = null;

    // 1. 即時預覽引擎 (只顯示原圖，確保 60fps 不卡頓)
    function onResults(results) {
      latestImage = results.image;
      if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
        latestLandmarks = results.multiFaceLandmarks[0];
      } else {
        latestLandmarks = null;
      }

      if (canvasElement.width !== results.image.width || canvasElement.height !== results.image.height) {
        canvasElement.width = results.image.width;
        canvasElement.height = results.image.height;
      }
      
      canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
    }

    // 升級後的拍照處理函式 (直接覆蓋原本的 snapBtn.addEventListener)
      snapBtn.addEventListener('click', async () => {
        if (!latestImage || !latestLandmarks) return;
        
        flashElement.style.opacity = 1;
        setTimeout(() => flashElement.style.opacity = 0, 100);
        statusInfo.style.display = 'block';
        snapBtn.disabled = true;

        await new Promise(resolve => setTimeout(resolve, 50));

        const w = latestImage.width;
        const h = latestImage.height;
        const saveCanvas = document.createElement('canvas');
        saveCanvas.width = w; saveCanvas.height = h;
        const ctx = saveCanvas.getContext('2d');
        ctx.drawImage(latestImage, 0, 0, w, h);

        // --- A. 高頻提取 (保留毛孔細節) ---
        // 商業級核心：美顏但不失去皮膚紋理
        const highFreq = document.createElement('canvas');
        highFreq.width = w; highFreq.height = h;
        const hCtx = highFreq.getContext('2d');
        hCtx.filter = 'blur(1px)';
        hCtx.drawImage(latestImage, 0, 0, w, h);
        hCtx.globalCompositeOperation = 'difference';
        hCtx.drawImage(latestImage, 0, 0, w, h);

        // --- B. 深度美肌 (柔化+亮度優化) ---
        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = w; tempCanvas.height = h;
        const tempCtx = tempCanvas.getContext('2d');
        // 提高亮度並大幅降低對比，製造「白瓷肌」感
        tempCtx.filter = 'blur(30px) brightness(1.2) contrast(0.7)';
        tempCtx.drawImage(latestImage, 0, 0, w, h);
        
        // 遮罩處理 (同前)
        tempCtx.globalCompositeOperation = 'destination-in';
        const grad = tempCtx.createRadialGradient(latestLandmarks[1].x*w, latestLandmarks[1].y*h, 0, latestLandmarks[1].x*w, latestLandmarks[1].y*h, w*0.4);
        grad.addColorStop(0, 'rgba(0,0,0,1)'); grad.addColorStop(1, 'rgba(0,0,0,0)');
        tempCtx.fillStyle = grad; tempCtx.fillRect(0,0,w,h);

        // --- C. 專業修容 (遮瑕+立體光) ---
        // 針對眼下黑斑，使用「疊色技術」而非暴力提亮
        tempCtx.globalCompositeOperation = 'source-over';
        tempCtx.fillStyle = 'rgba(255, 230, 210, 0.4)'; // 蜜桃色調
        tempCtx.beginPath();
        // 精準標註眼下黑斑區塊
        tempCtx.arc(latestLandmarks[145].x*w, latestLandmarks[145].y*h + h*0.02, w*0.08, 0, Math.PI*2);
        tempCtx.arc(latestLandmarks[374].x*w, latestLandmarks[374].y*h + h*0.02, w*0.08, 0, Math.PI*2);
        tempCtx.fill();

        ctx.drawImage(tempCanvas, 0, 0);
        
        // 疊回高頻細節 (保留真實毛孔)
        ctx.globalCompositeOperation = 'overlay';
        ctx.globalAlpha = 0.3;
        ctx.drawImage(highFreq, 0, 0);

        // --- 匯出 ---
        const finalCanvas = document.createElement('canvas');
        finalCanvas.width = w; finalCanvas.height = h;
        const finalCtx = finalCanvas.getContext('2d');
        finalCtx.translate(w, 0); finalCtx.scale(-1, 1);
        finalCtx.drawImage(ctx.canvas, 0, 0);
        const link = document.createElement('a');
        link.download = `beauty-photo-${new Date().getTime()}.png`;
        link.href = finalCanvas.toDataURL('image/png', 1.0);
        link.click();

        statusInfo.style.display = 'none';
        snapBtn.disabled = false;
      });

    const faceMesh = new FaceMesh({locateFile: (file) => {
      return `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`;
    }});
    
    faceMesh.setOptions({
      maxNumFaces: 1,
      refineLandmarks: false,
      minDetectionConfidence: 0.5,
      minTrackingConfidence: 0.5
    });
    faceMesh.onResults(onResults);

    const camera = new Camera(videoElement, {
      onFrame: async () => {
        await faceMesh.send({image: videoElement});
      },
      width: 1280,
      height: 720
    });
    camera.start();
  </script>
</body>
</html>
