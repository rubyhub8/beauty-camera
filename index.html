<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>美肌相機 - 進階控制</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
  <style>
    body { background: #222; display: flex; flex-direction: column; align-items: center; margin-top: 20px; font-family: sans-serif; color: white; }
    canvas { transform: scaleX(-1); border-radius: 10px; max-width: 100%; }
    /* 控制選單樣式 */
    .controls { margin-top: 20px; background: rgba(0,0,0,0.6); padding: 15px; border-radius: 8px; width: 90%; max-width: 400px; }
    .control-group { margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
    .control-group label { flex: 1; font-size: 14px; }
    .control-group input { flex: 2; }
  </style>
</head>
<body>
  <video id="input_video" playsinline style="display: none;"></video>
  <canvas id="output_canvas" width="640" height="480"></canvas>

  <div class="controls">
    <div class="control-group">
      <label>磨皮強度：</label>
      <input type="range" id="blurRange" min="0" max="15" value="6">
    </div>
    <div class="control-group">
      <label>美白亮度：</label>
      <input type="range" id="brightRange" min="1.0" max="1.5" step="0.05" value="1.15">
    </div>
  </div>

  <script>
    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    
    // 取得滑桿 DOM 元件
    const blurRange = document.getElementById('blurRange');
    const brightRange = document.getElementById('brightRange');

    function onResults(results) {
      canvasCtx.globalCompositeOperation = 'source-over';
      canvasCtx.filter = 'none';
      canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

      if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
        const landmarks = results.multiFaceLandmarks[0];

        canvasCtx.save();
        canvasCtx.beginPath();
        
        const nose = landmarks[1];
        const x = nose.x * canvasElement.width;
        const y = nose.y * canvasElement.height;
        
        canvasCtx.ellipse(x, y, 100, 140, 0, 0, 2 * Math.PI);
        canvasCtx.clip();

        // 關鍵：即時讀取畫面上滑桿的數值並套用
        const blurVal = blurRange.value;
        const brightVal = brightRange.value;
        canvasCtx.filter = `blur(${blurVal}px) brightness(${brightVal})`;
        
        canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
        canvasCtx.restore();
      }
    }

    const faceMesh = new FaceMesh({locateFile: (file) => {
      return `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`;
    }});
    
    faceMesh.setOptions({
      maxNumFaces: 1,
      refineLandmarks: false,
      minDetectionConfidence: 0.5,
      minTrackingConfidence: 0.5
    });
    faceMesh.onResults(onResults);

    const camera = new Camera(videoElement, {
      onFrame: async () => {
        await faceMesh.send({image: videoElement});
      },
      width: 640,
      height: 480
    });
    camera.start();
  </script>
</body>
</html>
