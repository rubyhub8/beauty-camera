<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>專業美肌相機 (光學融合版)</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    body { margin: 0; padding: 0; background: #000; overflow: hidden; display: flex; flex-direction: column; justify-content: center; height: 100vh; font-family: sans-serif; }
    canvas { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
    #flash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; opacity: 0; pointer-events: none; z-index: 100; }
    .snap-btn { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); width: 70px; height: 70px; border: none; border-radius: 50%; background: white; box-shadow: 0 4px 15px rgba(0,0,0,0.5); z-index: 10; cursor: pointer; }
  </style>
</head>
<body>
  <div id="flash"></div>
  <video id="input_video" playsinline style="display: none;"></video>
  <canvas id="output_canvas"></canvas>
  <button id="snapBtn" class="snap-btn"></button>

  <script>
    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    const snapBtn = document.getElementById('snapBtn');
    
    let latestImage = null;
    let latestLandmarks = null;

    function onResults(results) {
      latestImage = results.image;
      latestLandmarks = (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) ? results.multiFaceLandmarks[0] : null;
      canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
    }

    snapBtn.addEventListener('click', async () => {
      if (!latestImage || !latestLandmarks) return;
      const w = latestImage.width, h = latestImage.height;
      const canvas = document.createElement('canvas'); canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext('2d');

      // 1. 柔焦底妝層
      ctx.filter = 'blur(25px) brightness(1.05) contrast(0.85)';
      ctx.drawImage(latestImage, 0, 0);
      
      // 2. 五官保護罩 (避免眼睛嘴巴變模糊)
      ctx.filter = 'none';
      ctx.globalCompositeOperation = 'destination-out';
      ctx.fillStyle = '#000';
      const erase = (idx) => {
        ctx.beginPath();
        idx.forEach((i, n) => n==0 ? ctx.moveTo(latestLandmarks[i].x*w, latestLandmarks[i].y*h) : ctx.lineTo(latestLandmarks[i].x*w, latestLandmarks[i].y*h));
        ctx.closePath(); ctx.fill();
      };
      erase([33, 160, 158, 133, 153, 144]); erase([362, 385, 387, 263, 373, 380]);
      erase([78, 191, 80, 81, 82, 13, 312, 311, 310, 415, 308, 324, 318, 402, 317, 14, 87, 178, 88, 95]);

      // 3. 【核心修正】柔光遮瑕 (Soft Light Blend)
      // 這是解決可怕色塊的關鍵：改用軟光模式進行疊加
      ctx.globalCompositeOperation = 'soft-light'; 
      ctx.globalAlpha = 0.5; // 控制強度
      
      const drawSpot = (x, y) => {
        const rad = ctx.createRadialGradient(x, y, 0, x, y, w * 0.12);
        rad.addColorStop(0, '#FFCBA4'); // 膚色光源
        rad.addColorStop(1, 'transparent');
        ctx.fillStyle = rad;
        ctx.beginPath();
        ctx.arc(x, y, w * 0.12, 0, Math.PI*2);
        ctx.fill();
      };

      // 針對淚溝與法令紋進行光學提亮
      drawSpot(latestLandmarks[145].x*w, latestLandmarks[145].y*h + h*0.02);
      drawSpot(latestLandmarks[374].x*w, latestLandmarks[374].y*h + h*0.02);

      // 4. 最後覆蓋高頻紋理 (細膩毛孔)
      ctx.globalCompositeOperation = 'overlay';
      ctx.globalAlpha = 0.2;
      ctx.drawImage(latestImage, 0, 0);

      // 匯出
      const final = document.createElement('canvas'); final.width = w; final.height = h;
      const fCtx = final.getContext('2d');
      fCtx.translate(w, 0); fCtx.scale(-1, 1);
      fCtx.drawImage(canvas, 0, 0);
      const link = document.createElement('a');
      link.download = `beauty-${Date.now()}.png`;
      link.href = final.toDataURL('image/png');
      link.click();
    });

    const fm = new FaceMesh({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`});
    fm.setOptions({maxNumFaces: 1, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5});
    fm.onResults(onResults);
    new Camera(videoElement, {onFrame: async () => await fm.send({image: videoElement}), width: 1280, height: 720}).start();
  </script>
</body>
</html>
