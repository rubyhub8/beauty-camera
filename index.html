<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>美肌相機 - 精準磨皮</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
  <style>
    body { background: #222; display: flex; justify-content: center; margin-top: 50px; }
    canvas { transform: scaleX(-1); border-radius: 10px; }
  </style>
</head>
<body>
  <video id="input_video" playsinline style="display: none;"></video>
  <canvas id="output_canvas" width="640" height="480"></canvas>

  <script>
    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');

    function onResults(results) {
      // 1. 畫出清晰的原圖
      canvasCtx.globalCompositeOperation = 'source-over';
      canvasCtx.filter = 'none';
      canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

      if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
        const landmarks = results.multiFaceLandmarks[0];

        // 2. 建立遮罩範圍（以鼻樑為中心的橢圓形）
        canvasCtx.save();
        canvasCtx.beginPath();
        
        const nose = landmarks[1];
        const x = nose.x * canvasElement.width;
        const y = nose.y * canvasElement.height;
        
        canvasCtx.ellipse(x, y, 100, 140, 0, 0, 2 * Math.PI);
        canvasCtx.clip();

        // 3. 疊加柔焦與提亮效果
        canvasCtx.filter = 'blur(6px) brightness(1.15)';
        canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
        
        canvasCtx.restore();
      }
    }

    const faceMesh = new FaceMesh({locateFile: (file) => {
      return `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`;
    }});
    
    faceMesh.setOptions({
      maxNumFaces: 1,
      refineLandmarks: false,
      minDetectionConfidence: 0.5,
      minTrackingConfidence: 0.5
    });
    faceMesh.onResults(onResults);

    const camera = new Camera(videoElement, {
      onFrame: async () => {
        await faceMesh.send({image: videoElement});
      },
      width: 640,
      height: 480
    });
    camera.start();
  </script>
</body>
</html>
