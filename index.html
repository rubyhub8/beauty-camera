<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>專業美肌相機 (重度遮瑕版)</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    body { margin: 0; padding: 0; background: #111; overflow: hidden; display: flex; flex-direction: column; justify-content: center; height: 100vh; font-family: sans-serif; }
    canvas { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
    .controls { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.75); padding: 20px; border-radius: 16px; width: 85%; max-width: 400px; color: white; backdrop-filter: blur(5px); }
    .control-group { margin-bottom: 15px; display: flex; align-items: center; }
    .control-group label { flex: 1; font-size: 15px; font-weight: bold; }
    .control-group input { flex: 2; }
    .snap-btn { width: 100%; padding: 14px; border: none; border-radius: 10px; background: #FF3B30; color: white; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.2s; }
    .snap-btn:active { background: #CC2E26; transform: scale(0.98); }
  </style>
</head>
<body>
  <video id="input_video" playsinline style="display: none;"></video>
  <canvas id="output_canvas"></canvas>

  <div class="controls">
    <div class="control-group">
      <label>粉底磨皮：</label>
      <input type="range" id="blurRange" min="0" max="40" value="25">
    </div>
    <div class="control-group">
      <label>強力遮瑕：</label>
      <input type="range" id="concealRange" min="0" max="1.0" step="0.05" value="0.8">
    </div>
    <button id="snapBtn" class="snap-btn">📸 拍照儲存</button>
  </div>

  <script>
    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    
    const blurRange = document.getElementById('blurRange');
    const concealRange = document.getElementById('concealRange');
    const snapBtn = document.getElementById('snapBtn');

    function onResults(results) {
      if (canvasElement.width !== results.image.width || canvasElement.height !== results.image.height) {
        canvasElement.width = results.image.width;
        canvasElement.height = results.image.height;
      }

      canvasCtx.globalCompositeOperation = 'source-over';
      canvasCtx.filter = 'none';
      canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

      if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
        const landmarks = results.multiFaceLandmarks[0];
        
        const nose = landmarks[1];
        const leftCheek = landmarks[234];
        const rightCheek = landmarks[454];
        const top = landmarks[10];
        const chin = landmarks[152];

        // --- 全臉粉底 ---
        const centerX = nose.x * canvasElement.width;
        const centerY = nose.y * canvasElement.height; 
        const faceWidth = Math.abs(rightCheek.x - leftCheek.x) * canvasElement.width;
        const faceHeight = Math.abs(chin.y - top.y) * canvasElement.height;
        const radiusX = faceWidth * 0.75; 
        const radiusY = faceHeight * 0.75;

        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = canvasElement.width;
        tempCanvas.height = canvasElement.height;
        const tempCtx = tempCanvas.getContext('2d');

        // 強力壓低對比，把斑點的銳利邊緣強行模糊化
        const blurVal = blurRange.value;
        tempCtx.filter = `blur(${blurVal}px) brightness(1.15) contrast(0.75)`;
        tempCtx.drawImage(results.image, 0, 0, tempCanvas.width, tempCanvas.height);

        tempCtx.globalCompositeOperation = 'destination-in';
        const gradient = tempCtx.createRadialGradient(centerX, centerY, radiusX * 0.85, centerX, centerY, radiusX * 1.15);
        gradient.addColorStop(0, 'rgba(0, 0, 0, 1)'); 
        gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
        tempCtx.fillStyle = gradient;
        tempCtx.beginPath();
        tempCtx.ellipse(centerX, centerY, radiusX, radiusY, 0, 0, 2 * Math.PI);
        tempCtx.fill();

        tempCtx.globalCompositeOperation = 'destination-out';
        tempCtx.fillStyle = 'black'; 
        const leftEyeIndices = [33, 160, 158, 133, 153, 144];
        const rightEyeIndices = [362, 385, 387, 263, 373, 380];
        const mouthIndices = [78, 191, 80, 81, 82, 13, 312, 311, 310, 415, 308, 324, 318, 402, 317, 14, 87, 178, 88, 95];

        const eraseFeature = (indices) => {
          tempCtx.beginPath();
          indices.forEach((index, i) => {
            const pt = landmarks[index];
            const px = pt.x * canvasElement.width;
            const py = pt.y * canvasElement.height;
            if (i === 0) tempCtx.moveTo(px, py);
            else tempCtx.lineTo(px, py);
          });
          tempCtx.closePath();
          tempCtx.fill();
        };

        eraseFeature(leftEyeIndices);
        eraseFeature(rightEyeIndices);
        eraseFeature(mouthIndices);

        canvasCtx.globalCompositeOperation = 'source-over';
        canvasCtx.drawImage(tempCanvas, 0, 0);

        // --- 顴骨重度遮瑕 (Color Dodge) ---
        const concealStrength = concealRange.value;
        if (concealStrength > 0) {
            canvasCtx.globalCompositeOperation = 'color-dodge';
            canvasCtx.globalAlpha = concealStrength;

            const drawConcealer = (x, y, radiusX, radiusY, rotation) => {
                const grad = canvasCtx.createRadialGradient(x, y, 0, x, y, radiusX);
                // 提高不透明度與白度
                grad.addColorStop(0, 'rgba(255, 230, 210, 0.9)'); 
                grad.addColorStop(0.6, 'rgba(255, 230, 210, 0.4)');
                grad.addColorStop(1, 'rgba(255, 230, 210, 0)');
                
                canvasCtx.save();
                canvasCtx.translate(x, y);
                canvasCtx.rotate(rotation);
                canvasCtx.fillStyle = grad;
                canvasCtx.beginPath();
                canvasCtx.ellipse(0, 0, radiusX, radiusY, 0, 0, 2 * Math.PI);
                canvasCtx.fill();
                canvasCtx.restore();
            };

            // 鎖定左側顴骨 (117)
            const leftCheekbone = landmarks[117];
            drawConcealer(leftCheekbone.x * canvasElement.width, leftCheekbone.y * canvasElement.height, faceWidth * 0.25, faceWidth * 0.18, -0.2);

            // 鎖定右側顴骨 (346)
            const rightCheekbone = landmarks[346];
            drawConcealer(rightCheekbone.x * canvasElement.width, rightCheekbone.y * canvasElement.height, faceWidth * 0.25, faceWidth * 0.18, 0.2);

            // 法令紋提亮
            const leftNoseWing = landmarks[114];
            const rightNoseWing = landmarks[343];
            drawConcealer(leftNoseWing.x * canvasElement.width, leftNoseWing.y * canvasElement.height, faceWidth * 0.1, faceWidth * 0.15, 0.3);
            drawConcealer(rightNoseWing.x * canvasElement.width, rightNoseWing.y * canvasElement.height, faceWidth * 0.1, faceWidth * 0.15, -0.3);

            canvasCtx.globalAlpha = 1.0;
            canvasCtx.globalCompositeOperation = 'source-over';
        }
      }
    }

    snapBtn.addEventListener('click', () => {
      const saveCanvas = document.createElement('canvas');
      saveCanvas.width = canvasElement.width;
      saveCanvas.height = canvasElement.height;
      const ctx = saveCanvas.getContext('2d');
      ctx.translate(saveCanvas.width, 0);
      ctx.scale(-1, 1);
      ctx.drawImage(canvasElement, 0, 0);
      const link = document.createElement('a');
      link.download = `beauty-cam-${new Date().getTime()}.png`;
      link.href = saveCanvas.toDataURL('image/png');
      link.click();
    });

    const faceMesh = new FaceMesh({locateFile: (file) => {
      return `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`;
    }});
    faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: false, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
    faceMesh.onResults(onResults);

    const camera = new Camera(videoElement, {
      onFrame: async () => { await faceMesh.send({image: videoElement}); },
      width: 1280, height: 720
    });
    camera.start();
  </script>
</body>
</html>
